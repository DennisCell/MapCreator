    <style>
      :root {
        --location-scale: 1.0;
      }
      .scalable-content {
        transform: scale(var(--location-scale));
        transition: transform 0.2s ease-out;
      }
      .scalable-marker-content {
        transform-origin: center center;
      }
      .scalable-tooltip-content {
        transform-origin: left center;
      }
      /* Reset Leaflet's permanent tooltip styles to allow for custom HTML content styling */
      .custom-leaflet-tooltip.leaflet-tooltip-permanent {
        background: transparent;
        border: none;
        box-shadow: none;
        padding: 0;
      }
      .custom-leaflet-tooltip.leaflet-tooltip-permanent::before {
        content: none; /* Hide the default arrow */
      }
    </style>
